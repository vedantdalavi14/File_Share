<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download File</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold text-center mb-6">Download File</h1>
        <p class="text-center mb-6">You've received: <span class="font-semibold">{{ filename }}</span></p>
        
        <a href="/download_file/{{ filepath }}" 
           class="block w-full bg-green-600 text-white py-2 px-4 rounded-md text-center hover:bg-green-700 transition">
            Download Now
        </a>
    </div>
</body>
</html>
