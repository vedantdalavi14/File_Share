<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share File</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold text-center mb-6">Share Your File</h1>
        <p class="text-center mb-4">File: <span class="font-semibold">{{ filename }}</span></p>
        
        <div class="flex justify-center mb-6">
            <img src="data:image/png;base64,{{ qr_code }}" alt="QR Code" class="border border-gray-200 p-2">
        </div>
        
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-1">Share this link:</label>
            <div class="flex">
                <input type="text" value="{{ share_url }}" id="shareUrl" 
                    class="flex-1 border border-gray-300 rounded-l-md px-3 py-2 text-sm" readonly>
                <button onclick="copyToClipboard()" 
                    class="bg-blue-600 text-white px-3 py-2 rounded-r-md text-sm hover:bg-blue-700">
                    Copy
                </button>
            </div>
        </div>
        
        <a href="/" class="block text-center text-blue-600 hover:text-blue-800">Upload another file</a>
    </div>

    <script>
        function copyToClipboard() {
            const copyText = document.getElementById("shareUrl");
            copyText.select();
            copyText.setSelectionRange(0, 99999); // For mobile devices
            navigator.clipboard.writeText(copyText.value);
            alert("Link copied to clipboard!");
        }
    </script>
</body>
</html>
